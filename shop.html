<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>お買い物 | こっちの！クイズ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

<div class="shop-wrap">

  <!-- ヘッダー -->
  <div class="shop-header">
    <button class="back-btn" onclick="history.back()">←</button>
    <h1 id="shop-user-name">お買い物</h1>
    <div class="shop-coin-display">
      <span class="coin-icon coin-icon-lg"></span>
      <span id="shop-coin-count">0</span>
    </div>
  </div>

  <!-- 未使用の商品 -->
  <div id="unused-section" style="display:none">
    <div class="shop-section-title">未使用の商品</div>
    <div id="unused-list"></div>
  </div>

  <!-- お買い物メニュー -->
  <div class="shop-section-title">お買い物メニュー</div>
  <div id="shop-items-list"></div>

  <!-- 購入履歴 -->
  <button class="btn-history" id="btn-history" onclick="toggleHistory()">📋 購入履歴</button>
  <div id="history-section" style="display:none;margin-top:12px">
    <div id="history-list"></div>
  </div>

</div>

<!-- ==================== 購入確認モーダル ==================== -->
<div id="confirm-overlay" class="modal-overlay" style="display:none">
  <div class="modal-content">
    <div class="modal-msg" id="confirm-msg"></div>
    <div class="modal-btns">
      <button class="btn-modal-cancel" onclick="cancelPurchase()">いいえ</button>
      <button class="btn-modal-ok" onclick="doPurchase()">はい</button>
    </div>
  </div>
</div>

<!-- ==================== 利用申請確認モーダル ==================== -->
<div id="request-overlay" class="modal-overlay" style="display:none">
  <div class="modal-content">
    <div class="modal-msg" id="request-msg"></div>
    <div class="modal-btns">
      <button class="btn-modal-cancel" onclick="cancelRequest()">キャンセル</button>
      <button class="btn-modal-ok" onclick="doRequest()">申請する</button>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/shop.js"></script>
</body>
</html>
